<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Beauty & Glam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>

<body class="min-h-screen bg-stone-100 flex items-center justify-center p-6">
    <div class="w-full max-w-lg rounded-3xl border border-stone-200 bg-white p-8 shadow-lg">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-stone-800">Únete a nosotros</h1>
            <p class="text-sm text-stone-500 italic">Crea tu perfil en Beauty&Glam</p>
        </div>

        {# BLOQUE DE MENSAJES FLASH #}
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-4 p-4 rounded-xl border text-sm font-bold shadow-sm 
                {% if category == 'success' %} bg-green-50 text-green-700 border-green-200 
                {% elif category == 'warning' %} bg-yellow-50 text-yellow-700 border-yellow-200
                {% else %} bg-red-50 text-red-700 border-red-200 {% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-xs font-bold text-stone-700 uppercase">Nombre</label>
                    <input type="text" name="nombre" required value="{{ request.form.get('nombre', '') }}"
                        class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
                </div>
                <div>
                    <label class="block mb-1 text-xs font-bold text-stone-700 uppercase">Apellidos</label>
                    <input type="text" name="apellidos" required value="{{ request.form.get('apellidos', '') }}"
                        class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-xs font-bold text-stone-700 uppercase">Género</label>
                    <select name="genero" class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none bg-white">
                        <option value="Sin especificar" {% if request.form.get('genero') == 'Sin especificar' %}selected{% endif %}>Prefiero no decirlo</option>
                        <option value="Femenino" {% if request.form.get('genero') == 'Femenino' %}selected{% endif %}>Femenino</option>
                        <option value="Masculino" {% if request.form.get('genero') == 'Masculino' %}selected{% endif %}>Masculino</option>
                        <option value="Otro" {% if request.form.get('genero') == 'Otro' %}selected{% endif %}>Otro</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-1 text-xs font-bold text-stone-700 uppercase">Teléfono</label>
                    <input type="tel" name="telefono" required placeholder="4771234567" value="{{ request.form.get('telefono', '') }}"
                        class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none
                        " maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        
                </div>
            </div>

            <div>
                <label class="block mb-1 text-xs font-bold text-stone-700 uppercase">Fecha de Nacimiento</label>
                <input type="date" name="fecha_nacimiento" value="{{ request.form.get('fecha_nacimiento', '') }}"
                    class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
            </div>

            <div>
                <label class="block mb-1 text-xs font-bold text-stone-700 uppercase">Correo Electrónico</label>
                <input type="email" name="correo" required placeholder="tu@ejemplo.com" value="{{ request.form.get('correo', '') }}"
                    class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
            </div>

            <div>
                <label class="block mb-1 text-xs font-bold text-stone-700 uppercase">Contraseña</label>
                <input type="password" name="password" required placeholder="••••••••"
                    class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
            </div>

            <button type="submit" class="w-full rounded-2xl mt-4 bg-pink-500 py-4 text-sm font-bold text-white hover:bg-pink-600 shadow-md transition-all">
                Registrarme ahora
            </button>
        </form>

        <p class="mt-6 text-center text-xs text-stone-500">
            ¿Ya tienes cuenta? <a href="{{ url_for('acceso.login') }}" class="font-bold text-pink-500 hover:underline">Inicia sesión aquí</a>
        </p>
    </div>
</body>
</html>
