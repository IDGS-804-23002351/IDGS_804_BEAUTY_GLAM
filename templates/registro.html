<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Beauty & Glam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>

<body class="min-h-screen bg-stone-100 flex items-center justify-center p-6">
    <div class="w-full max-w-lg rounded-3xl border border-stone-200 bg-white p-8 shadow-lg">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-stone-800">Únete a nosotros</h1>
            <p class="text-sm text-stone-500 italic">Crea tu perfil en Beauty & Glam</p>
        </div>

        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-2 text-xs font-bold text-stone-700 uppercase">Nombre</label>
                    <input type="text" name="nombre" required
                        class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
                </div>
                <div>
                    <label class="block mb-2 text-xs font-bold text-stone-700 uppercase">Apellidos</label>
                    <input type="text" name="apellidos" required
                        class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
                </div>
            </div>

            <div>
                <label class="block mb-2 mt-4 text-xs font-bold text-stone-700 uppercase">Correo Electrónico</label>
                <input type="email" name="correo" required placeholder="tu@ejemplo.com"
                    class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
            </div>

            <div>
                <label class="block mb-2 mt-4 text-xs font-bold text-stone-700 uppercase">Contraseña</label>
                <input type="password" name="password" required placeholder="••••••••"
                    class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
            </div>

            <div>
                <button type="submit"
                    class="w-full rounded-2xl mt-6 bg-pink-500 py-4 text-sm font-bold text-white hover:bg-pink-600 shadow-md transition-all">
                    Registrarme ahora
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-xs text-stone-500">
            ¿Ya tienes cuenta? <a href="{{ url_for('acceso.login') }}"
                class="font-bold text-pink-500 hover:underline">Inicia sesión aquí</a>
        </p>
    </div>
</body>

</html>
