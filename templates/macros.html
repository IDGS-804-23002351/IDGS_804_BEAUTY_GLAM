{% macro datos(name,placeholder,type="text") %}
<div class="mb-3">
    <label for="{{name}}" class="block mb-2 text-sm font-bold text-stone-700">{{ name }}</label>
    <input type="{{type}}" id="{{name}}" name="{{name}}" placeholder="{{ placeholder }}"
           class="w-full rounded-xl border border-stone-200 bg-white px-4 py-3 text-sm text-stone-700 focus:border-pink-300 focus:outline-none focus:ring-2 focus:ring-pink-100">
</div>
{% endmacro %}

{% macro campoNuevo(field) %}
<div class="mb-3">
    <label class="block mb-2 text-sm font-bold text-stone-700">{{ field.label }}</label>
    {{ field(**kwargs) | safe }}
    {% if field.errors %}
        {% for error in field.errors %}
            <li style="color: red">{{ error }}</li>
        {% endfor %}
    {% endif %}
</div>
{% endmacro %}
