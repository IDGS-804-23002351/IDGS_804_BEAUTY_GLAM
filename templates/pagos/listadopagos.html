{% extends "layout.html" %}
{% block title %}Pagos{% endblock %}
{% block page_title %}Pagos{% endblock %}

{% block container %}
<div class="space-y-5">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-2xl font-extrabold text-stone-800">Pagos</h2>
            <p class="text-sm text-stone-500">Cobros realizados</p>
        </div>
        <a href="{{ url_for('pagos_form') }}" class="rounded-2xl bg-pink-500 px-5 py-3 text-sm font-bold text-white hover:bg-pink-600">
            Nuevo pago
        </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
        <input type="text" placeholder="Buscar cliente" class="w-full rounded-xl border border-stone-200 px-4 py-3">
        <input type="text" placeholder="Servicio" class="w-full rounded-xl border border-stone-200 px-4 py-3">
        <input type="text" placeholder="Método" class="w-full rounded-xl border border-stone-200 px-4 py-3">
        <input type="text" placeholder="Fecha" class="w-full rounded-xl border border-stone-200 px-4 py-3">
    </div>

    <div class="overflow-hidden rounded-3xl border border-stone-200 bg-white shadow-sm">
        <table class="min-w-full text-sm">
            <thead class="bg-pink-50">
                <tr>
                    <th class="px-4 py-3 text-left">Cliente</th>
                    <th class="px-4 py-3 text-left">Servicio</th>
                    <th class="px-4 py-3 text-left">Subtotal</th>
                    <th class="px-4 py-3 text-left">Descuento</th>
                    <th class="px-4 py-3 text-left">Total</th>
                    <th class="px-4 py-3 text-left">Método</th>
                    <th class="px-4 py-3 text-left">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr class="border-t">
                    <td class="px-4 py-3">Ana López</td>
                    <td class="px-4 py-3">Manicure</td>
                    <td class="px-4 py-3">$200</td>
                    <td class="px-4 py-3">$0</td>
                    <td class="px-4 py-3">$200</td>
                    <td class="px-4 py-3">Efectivo</td>
                    <td class="px-4 py-3 flex gap-2">
                        <a href="#" class="rounded-xl bg-violet-100 px-3 py-2 text-xs font-bold text-violet-700">Ver ticket</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
