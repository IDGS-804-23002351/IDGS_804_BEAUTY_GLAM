{% extends "layout.html" %}
{% block title %}Roles{% endblock %}
{% block page_title %}Roles{% endblock %}

{% block container %}
<div class="space-y-5">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-2xl font-extrabold text-stone-800">RBAC</h2>
            <p class="text-sm text-stone-500">Permisos por módulo</p>
        </div>
        <a href="{{ url_for('roles_form') }}" class="rounded-2xl bg-pink-500 px-5 py-3 text-sm font-bold text-white">Nuevo rol</a>
    </div>

    <div class="overflow-hidden rounded-3xl border border-stone-200 bg-white shadow-sm">
        <table class="min-w-full text-sm">
            <thead class="bg-pink-50">
                <tr>
                    <th class="px-4 py-3 text-left">Rol</th>
                    <th class="px-4 py-3 text-left">Descripción</th>
                    <th class="px-4 py-3 text-left">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr class="border-t">
                    <td class="px-4 py-3">Administrador</td>
                    <td class="px-4 py-3">Acceso total</td>
                    <td class="px-4 py-3"><a href="#" class="rounded-xl bg-violet-100 px-3 py-2 text-xs font-bold text-violet-700">Editar</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
