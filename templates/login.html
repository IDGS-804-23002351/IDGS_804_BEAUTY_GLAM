<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Beauty & Glam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>
<body class="min-h-screen bg-stone-100 flex items-center justify-center p-6">
    <div class="w-full max-w-lg rounded-3xl border border-stone-200 bg-white p-8 shadow-lg">
        <div class="flex items-center gap-4 mb-5">
            <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-pink-100 text-pink-500 font-bold text-2xl">BG</div>
            <div>
                <h1 class="text-2xl font-extrabold text-stone-800">Beauty &amp; Glam</h1>
                <p class="text-sm text-stone-500">Acceso al sistema</p>
            </div>
        </div>

        <p class="text-sm text-stone-500 mb-4">Ingresa con tus credenciales</p>

        <form method="POST">
            <div class="mb-4">
                <label class="block mb-2 text-sm font-bold text-stone-700">Correo / Usuario</label>
                <input type="text" name="usuario" placeholder="admin@beautyglam.com"
                       class="w-full rounded-xl border border-stone-200 px-4 py-3">
            </div>

            <div class="mb-4">
                <label class="block mb-2 text-sm font-bold text-stone-700">Contraseña</label>
                <input type="password" name="password" placeholder="••••••••"
                       class="w-full rounded-xl border border-stone-200 px-4 py-3">
            </div>

            <div class="flex justify-between gap-3 mt-5">
                <a href="#" class="rounded-2xl border border-stone-200 bg-white px-5 py-3 text-sm font-bold text-stone-700">¿Olvidaste tu contraseña?</a>
                <button type="submit" class="rounded-2xl bg-pink-500 px-5 py-3 text-sm font-bold text-white hover:bg-pink-600">Iniciar sesión</button>
            </div>
        </form>

        <div class="mt-5 rounded-2xl border border-yellow-200 bg-yellow-50 px-4 py-3 text-sm font-bold text-yellow-700">
            Bloqueo por intentos fallidos
        </div>
    </div>
</body>
</html>
