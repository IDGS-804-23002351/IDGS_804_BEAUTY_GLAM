<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña | Beauty & Glam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>
<body class="min-h-screen bg-stone-100 flex items-center justify-center p-6">
    <div class="w-full max-w-sm rounded-3xl border border-stone-200 bg-white p-8 shadow-lg text-center">
        <div class="w-16 h-16 bg-pink-100 text-pink-600 rounded-3xl flex items-center justify-center mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-stone-800">Nueva contraseña</h2>
        <p class="text-sm text-stone-500 mb-6">Crea una clave segura para tu cuenta.</p>

        <form action="{{ url_for('acceso.restablecer_password') }}" method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <input type="password" name="password" required placeholder="Nueva contraseña"
                class="w-full mb-2 mt-4  rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
            
            <input type="password" name="confirm_password" required placeholder="Confirmar contraseña"
                class="w-full mb-2 mt-4 rounded-xl border border-stone-200 px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 outline-none">
            
            <button type="submit" class="w-full mb-2 mt-4 rounded-2xl bg-stone-800 py-3 text-sm font-bold text-white hover:bg-stone-900 transition-all">
                Actualizar contraseña
            </button>
        </form>
    </div>
</body>
</html>
