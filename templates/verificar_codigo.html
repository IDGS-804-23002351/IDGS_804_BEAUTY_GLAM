<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Verificar Código | Beauty & Glam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>

<body class="min-h-screen bg-stone-100 flex items-center justify-center p-6">
    <div class="w-full max-w-sm rounded-3xl border border-stone-200 bg-white p-8 shadow-lg text-center">
        <div class="w-16 h-16 bg-violet-100 text-violet-500 rounded-3xl flex items-center justify-center mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-stone-800">Verifica tu código</h2>
        <p class="text-sm text-stone-500 mb-6">Ingresa el código de 6 dígitos que enviamos a tu correo.</p>

        <div>
            {# BLOQUE DE ALERTAS PERSONALIZADO #}
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="mb-4 p-4 rounded-xl border text-sm font-bold shadow-sm 
        {% if category == 'success' %} bg-green-50 text-green-700 border-green-200 
        {% elif category == 'info' %} bg-blue-50 text-blue-700 border-blue-200
        {% elif category == 'warning' %} bg-yellow-50 text-yellow-700 border-yellow-200
        {% else %} bg-red-50 text-red-700 border-red-200 {% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
        </div>

        <form action="{{ url_for('acceso.verificar_codigo') }}" method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="codigo" maxlength="6" required placeholder="Código de 6 dígitos"
                class="w-full text-center tracking-widest text-xl rounded-xl border border-stone-200 px-4 py-3 focus:ring-2 focus:ring-pink-300 outline-none">

            <button type="submit"
                class="w-full rounded-2xl bg-stone-800 py-3 text-sm font-bold text-white hover:bg-stone-900 transition-all">
                Verificar
            </button>
        </form>
    </div>
</body>

</html>
